version: "3.9"

services:
  app:
    image: mcr.microsoft.com/dotnet/sdk:10.0
    volumes:
      - ..:/workspace:cached
    command: sleep infinity
    environment:
      - DOTNET_ENVIRONMENT=Development
    depends_on:
      - qdrant

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage

volumes:
  qdrant_storage:
